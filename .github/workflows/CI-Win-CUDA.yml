name: CI-Win-CUDA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force-cache-update:
        description: 'Force cache rebuild (deletes old cache and builds fresh)'
        required: false
        type: boolean
        default: false

env:
  NOTE_TO_SELF: "environments can not be passed from here to reused workflows!"

permissions:
  actions: write  # Required for cache deletion via gh cache delete
  contents: read  # Required for checkout

jobs:
  win-cuda-build-test:
    uses: ./.github/workflows/build-test-win.yml
    with:
      runner: windows-cuda
      flav: 'Windows-cuda'
      cuda: 'ON'
      is-selfhosted: true
      nProc: 8
      nTestTimeoutMins: 20
      force-cache-update: ${{ inputs.force-cache-update == true }}
  win-cuda-publish:
    needs: win-cuda-build-test
    permissions:
      checks: write
      pull-requests: write
    uses: ./.github/workflows/publish-test.yml
    with:
      flav: 'Windows-cuda'
    secrets:
      GIST_TOKEN: ${{ secrets.GIST_TOKEN }}      