name: CI-Linux-ARM64

on:
  push:  # Trigger on push to any branch
    branches: ["**"]  # Any branch
    paths-ignore:
      - '**.md'
      - '.github/docs/**'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.github/docs/**'
      - 'docs/**'
  workflow_dispatch:

env:
  NOTE_TO_SELF: "environments can not be passed from here to reused workflows!"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  
jobs:
  jetson-build-test:
    uses: ./.github/workflows/build-test-lin.yml
    with:
      runner: AGX
      flav: Linux_ARM64
      is-selfhosted: true
      cuda: 'ON'
      prep-cmd: |
        echo skipping builder prep as I can not sudo
        # Install PowerShell in user space if not present
        if ! command -v pwsh &> /dev/null; then
          echo "Installing PowerShell 7.2 for ARM64..."
          curl -L -o /tmp/powershell.tar.gz https://github.com/PowerShell/PowerShell/releases/download/v7.2.23/powershell-7.2.23-linux-arm64.tar.gz
          mkdir -p ~/.local/bin/powershell
          tar zxf /tmp/powershell.tar.gz -C ~/.local/bin/powershell
          chmod +x ~/.local/bin/powershell/pwsh
          ln -sf ~/.local/bin/powershell/pwsh ~/.local/bin/pwsh
          rm /tmp/powershell.tar.gz
          echo "PowerShell installed successfully"
        else
          echo "PowerShell already installed"
        fi
      bootstrap-cmd: 'export PATH="$HOME/.local/bin/gcc-8:$PATH" && export VCPKG_FORCE_SYSTEM_BINARIES=1 && export CURL_HTTP_VERSION=HTTP/1.1 && ./vcpkg/bootstrap-vcpkg.sh'
      cache-path: './none'
      cmake-conf-cmd: 'export VCPKG_OVERLAY_PORTS=../thirdparty/custom-overlay && export CC=/usr/bin/gcc-8 && export CXX=/usr/bin/g++-8 && export CURL_HTTP_VERSION=HTTP/1.1 && cmake -B . -G Ninja -DENABLE_ARM64=ON ../base'
      nProc: 6
  jetson-publish:
    needs: jetson-build-test
    permissions:
      checks: write
      pull-requests: write
    uses: ./.github/workflows/publish-test.yml
    with:
      flav: Linux_ARM64
    secrets:
      GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
